<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<div class="mediaelement">
	<div class="mediaelement-video">
		<f:media file="{mediaElement}" width="{settings.detail.media.video.width}" height="{settings.detail.media.video.height}"/>
	</div>

	<f:variable name="mediaElementDescription">{mediaElement -> f:render.text(field: 'description')}</f:variable>
	<f:if condition="{mediaElementDescription}">
		<div class="medialement-alternative-content">
			<p class="news-img-caption">
				{mediaElementDescription}
			</p>
		</div>
	</f:if>
</div>
</html>
